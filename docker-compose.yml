version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ironmesh
      POSTGRES_USER: ironmesh
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironmesh"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  # PgBouncer for database connection pooling (Scaling)
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://ironmesh:${DB_PASSWORD}@postgres:5432/ironmesh
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  # MinIO for S3-compatible firmware storage (Scaling)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-password123}
    ports:
      - "9000:9000" # S3 API Port
      - "9001:9001" # Web UI Port
    volumes:
      - s3_data:/data
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - pgbouncer
      - minio
    environment:
      DATABASE_URL: postgres://ironmesh:${DB_PASSWORD}@pgbouncer:5432/ironmesh?sslmode=disable
      PORT: 8080
      NETWORK_CIDR: ${NETWORK_CIDR:-192.168.1.0/24}
      NVD_API_KEY: ${NVD_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-}
      FIRMWARE_ANALYZER_URL: http://firmware-analyzer:8001
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
      S3_ENDPOINT: minio:9000
      S3_BUCKET: ironmesh-firmware
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-admin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-password123}
    ports:
      - "8080:8080"
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./data:/app/data
      - firmware_uploads:/app/data/firmware-uploads
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  firmware-analyzer:
    build: ./firmware-analyzer
    restart: unless-stopped
    depends_on:
      - pgbouncer
    environment:
      DATABASE_URL: postgres://ironmesh:${DB_PASSWORD}@pgbouncer:5432/ironmesh?sslmode=disable
      NVD_API_KEY: ${NVD_API_KEY:-}
    volumes:
      - firmware_uploads:/firmware
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: /api/v1
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
  firmware_uploads:
  s3_data:
